<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية زوجتي حنان</title>
    <style>
        body {
            background-color: #ffe6f2;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 50px 20px;
            color: #d63384;
            display: none; /* نخفو الصفحة حتى تكتب المودباس */
        }
        .message-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .btn {
            background-color: #d63384; color: white; padding: 15px 30px;
            border: none; border-radius: 25px; font-size: 18px; cursor: pointer;
        }
        #video-container { display: none; margin-top: 20px; }
        video { width: 100%; max-width: 600px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="message-box">
        <h1>إلى زوجتي وحبيبتي حنان ❤️</h1>
        <p>اليوم 6 سبتمبر 2026، يجمعنا ربي في دار وحدة وتبدا حياتنا مع بعض. هذي هدية صغيرة مني ليك.</p>
    </div>

    <button id="showVideoBtn" class="btn" onclick="showVideo()">إضغطي هنا</button>

    <div id="video-container">
        <video id="myVideo" controls>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        // طلب المودباس أول ما تفتح الصفحة
        window.onload = function() {
            let password = "";
            while (password !== "123") { // المودباس هو 123
                password = prompt("🔒 أدخلي كلمة السر لرؤية المفاجأة:");
                if (password === null) {
                    document.body.innerHTML = "<h1>لا يمكن الدخول بدون كلمة السر</h1>";
                    document.body.style.display = "block";
                    return;
                }
            }
            document.body.style.display = "block"; // تظهر الصفحة كي تكتبو صحيح
        }

        function showVideo() {
            document.getElementById('showVideoBtn').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('myVideo').play();
        }
    </script>
</body>
</html>
